<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Mehndi Ceremony – Gohar &amp; Naveed</title>
  <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=EB+Garamond:ital,wght@0,400;1,400&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink:        #28150a;
      --brown:      #6b4228;
      --sepia:      #8c6040;
      --gold:       #b8912a;
      --gold-light: #d4aa4e;
      --cream:      #f5ede0;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #1a0e06;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* ─── Frame ─────────────────────────────────────── */
    .frame {
      position: relative;
      width:  min(430px, 100vw);
      height: min(932px, 100vh);
      overflow: hidden;
    }

    .bg {
      position: absolute;
      inset: 0;
      background: url('background.png') center top / cover no-repeat;
    }

    /* Soft inner glow keeps arch bright in the center */
    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 62% 55% at 50% 42%,
        rgba(255,252,245,0.08) 0%,
        transparent 70%);
      pointer-events: none;
    }

    /* ─── Particle glow (near lanterns) ──────────────── */
    .spark {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,210,80,.7) 0%, transparent 68%);
      animation: spark-float linear infinite;
      pointer-events: none;
      z-index: 1;
    }
    @keyframes spark-float {
      0%   { opacity: 0;   transform: translateY(0)     scale(1); }
      12%  { opacity: .85; }
      80%  { opacity: .3;  }
      100% { opacity: 0;   transform: translateY(-90px) scale(.25); }
    }

    /* ─── Content ────────────────────────────────────── */
    .content {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      color: var(--ink);
      /* Top padding clears the arch lanterns; sides clear the arch curve */
      padding: 29% 17% 0;
    }

    /* ─── Entrance animations ────────────────────────── */
    @keyframes rise {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .a { opacity: 0; animation: rise .85s cubic-bezier(.22,1,.36,1) forwards; }
    .d1 { animation-delay: .25s; }
    .d2 { animation-delay: .55s; }
    .d3 { animation-delay: .80s; }
    .d4 { animation-delay: 1.05s; }
    .d5 { animation-delay: 1.25s; }
    .d6 { animation-delay: 1.45s; }
    .d7 { animation-delay: 1.65s; }
    .d8 { animation-delay: 1.85s; }
    .d9 { animation-delay: 2.10s; }

    /* ─── Type: invite line ───────────────────────────── */
    .invite {
      font-family: 'EB Garamond', serif;
      font-size: clamp(13px, 3.1vw, 15px);
      font-style: italic;
      color: var(--sepia);
      letter-spacing: .06em;
      margin-bottom: 6px;
    }

    /* ─── Type: script hero ───────────────────────────── */
    .script {
      font-family: 'Pinyon Script', cursive;
      font-size: clamp(52px, 13vw, 64px);
      line-height: .95;
      color: var(--ink);
      margin-bottom: 8px;
    }

    /* ─── Type: "── of ──" ────────────────────────────── */
    .of-row {
      display: flex;
      align-items: center;
      gap: 9px;
      width: 44%;
      margin-bottom: 14px;
    }
    .of-bar { flex: 1; height: 1px; background: var(--sepia); opacity: .35; }
    .of-text {
      font-family: 'EB Garamond', serif;
      font-style: italic;
      font-size: clamp(13px, 3vw, 14px);
      color: var(--sepia);
      letter-spacing: .1em;
      flex-shrink: 0;
    }

    /* ─── Type: names ─────────────────────────────────── */
    .names-block { line-height: 1; }
    .name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(19px, 4.7vw, 24px);
      font-weight: 700;
      letter-spacing: .24em;
      color: var(--ink);
      display: block;
    }
    .amp {
      font-family: 'Pinyon Script', cursive;
      font-size: clamp(30px, 7.5vw, 38px);
      color: var(--gold);
      display: block;
      margin: 2px 0;
      line-height: 1;
    }

    /* ─── Ornament divider ────────────────────────────── */
    .orn {
      display: flex;
      align-items: center;
      gap: 7px;
      width: 62%;
      margin: 14px 0;
    }
    .orn-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold) 35%, var(--gold) 65%, transparent);
    }
    .orn-dia {
      width: 6px; height: 6px;
      border: 1.5px solid var(--gold);
      transform: rotate(45deg);
      flex-shrink: 0;
      animation: dia-turn 10s linear infinite;
    }
    .orn-dot {
      width: 3px; height: 3px;
      background: var(--gold);
      border-radius: 50%;
      flex-shrink: 0;
      opacity: .75;
    }
    @keyframes dia-turn { to { transform: rotate(225deg); } }

    /* ─── Type: date section ──────────────────────────── */
    .date-wrap { width: 100%; }

    .month-lbl {
      font-family: 'Playfair Display', serif;
      font-size: clamp(10px, 2.4vw, 12px);
      font-weight: 400;
      letter-spacing: .42em;
      text-transform: uppercase;
      color: var(--sepia);
      margin-bottom: 9px;
    }

    .date-row {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 80%;
      margin: 0 auto 8px;
    }
    .date-side {
      flex: 1;
      text-align: center;
    }
    .date-side span {
      display: block;
      font-family: 'Playfair Display', serif;
      font-size: clamp(8px, 1.9vw, 10px);
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--sepia);
      border-top: 1px solid var(--gold);
      padding-top: 5px;
      opacity: .85;
    }
    .date-num {
      font-family: 'Playfair Display', serif;
      font-size: clamp(42px, 10.5vw, 54px);
      font-weight: 700;
      line-height: 1;
      color: var(--ink);
      padding: 0 16px;
    }

    .year-lbl {
      font-family: 'Playfair Display', serif;
      font-size: clamp(11px, 2.6vw, 13px);
      letter-spacing: .35em;
      text-transform: uppercase;
      color: var(--sepia);
      font-weight: 400;
      margin-bottom: 13px;
    }

    /* ─── Type: venue ─────────────────────────────────── */
    .gold-sep {
      width: 34%;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
      opacity: .55;
      margin-bottom: 11px;
    }
    .at-lbl {
      font-family: 'EB Garamond', serif;
      font-style: italic;
      font-size: clamp(13px, 3.1vw, 15px);
      color: var(--sepia);
      letter-spacing: .06em;
      margin-bottom: 5px;
    }
    .venue {
      font-family: 'Playfair Display', serif;
      font-size: clamp(9.5px, 2.25vw, 11.5px);
      font-weight: 400;
      letter-spacing: .18em;
      text-transform: uppercase;
      line-height: 1.7;
      color: var(--brown);
    }

    /* ─── RSVP button ─────────────────────────────────── */
    .rsvp-anchor {
      position: absolute;
      bottom: 8%;
      left: 0; right: 0;
      display: flex;
      justify-content: center;
      z-index: 3;
    }
    .rsvp-btn {
      display: inline-flex;
      align-items: center;
      gap: 11px;
      padding: 13px 44px;
      background: var(--ink);
      color: var(--cream);
      font-family: 'Playfair Display', serif;
      font-size: clamp(10px, 2.3vw, 11.5px);
      letter-spacing: .38em;
      font-weight: 600;
      text-transform: uppercase;
      border: 1.5px solid var(--gold);
      border-radius: 50px;
      cursor: pointer;
      text-decoration: none;
      transition: background .3s, color .3s, letter-spacing .3s;
      animation: btn-pulse 4s ease-in-out infinite;
    }
    .rsvp-btn .star { font-size: 7px; color: var(--gold); transition: color .3s; }
    .rsvp-btn:hover, .rsvp-btn:active {
      background: var(--gold-light);
      color: var(--ink);
      letter-spacing: .44em;
    }
    .rsvp-btn:hover .star { color: var(--ink); }
    @keyframes btn-pulse {
      0%,100% { box-shadow: 0 0 0   rgba(184,145,42,.0), 0 4px 16px rgba(0,0,0,.35); }
      50%      { box-shadow: 0 0 22px rgba(184,145,42,.45), 0 4px 16px rgba(0,0,0,.35); }
    }

    /* ─── Modal ───────────────────────────────────────── */
    #modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(16, 8, 2, .82);
      backdrop-filter: blur(10px);
      justify-content: center;
      align-items: center;
    }
    .card {
      background: #faf5ec;
      border-radius: 18px;
      padding: 38px 28px 30px;
      width: min(340px, 92vw);
      text-align: center;
      position: relative;
      box-shadow: 0 24px 64px rgba(0,0,0,.55);
      border: 1px solid rgba(184,145,42,.25);
    }
    .card-close {
      position: absolute; top: 13px; right: 16px;
      background: none; border: none;
      font-size: 16px; cursor: pointer;
      color: var(--sepia); opacity: .65;
      line-height: 1;
    }
    .card-close:hover { opacity: 1; }
    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: .38em;
      text-transform: uppercase;
      color: var(--sepia);
      margin-bottom: 4px;
    }
    .card-sub {
      font-family: 'Pinyon Script', cursive;
      font-size: 36px;
      color: var(--ink);
      line-height: 1;
      margin-bottom: 20px;
    }
    .field {
      width: 100%;
      padding: 11px 14px;
      margin-bottom: 10px;
      border: 1px solid rgba(184,145,42,.4);
      border-radius: 9px;
      font-family: 'EB Garamond', serif;
      font-size: 15px;
      color: var(--ink);
      background: #fffdf7;
      outline: none;
      transition: border-color .2s;
    }
    .field:focus { border-color: var(--gold); }
    .field:last-of-type { margin-bottom: 14px; }
    .attend-row { display: flex; gap: 8px; margin-bottom: 16px; }
    .att-btn {
      flex: 1;
      padding: 10px 4px;
      border: 1px solid rgba(184,145,42,.5);
      border-radius: 30px;
      background: transparent;
      font-family: 'Playfair Display', serif;
      font-size: 10px;
      letter-spacing: .14em;
      text-transform: uppercase;
      cursor: pointer;
      color: var(--ink);
      transition: all .2s;
    }
    .att-btn.on { background: var(--ink); color: var(--cream); border-color: var(--ink); }
    .submit-btn {
      width: 100%;
      padding: 13px;
      background: var(--ink);
      border: 1.5px solid var(--gold);
      border-radius: 30px;
      font-family: 'Playfair Display', serif;
      font-size: 10.5px;
      letter-spacing: .32em;
      text-transform: uppercase;
      color: var(--cream);
      cursor: pointer;
      transition: background .25s, color .25s;
    }
    .submit-btn:hover { background: var(--gold-light); color: var(--ink); }
    .ty-wrap { padding: 6px 0; }
    .ty-star { font-size: 28px; color: var(--gold); margin-bottom: 10px; }
    .ty-title {
      font-family: 'Pinyon Script', cursive;
      font-size: 42px;
      color: var(--ink);
      line-height: 1;
      margin-bottom: 7px;
    }
    .ty-msg {
      font-family: 'EB Garamond', serif;
      font-style: italic;
      font-size: 14px;
      color: var(--sepia);
      letter-spacing: .04em;
    }
  </style>
</head>
<body>

<div class="frame">
  <div class="bg"></div>

  <!-- Lantern glow sparks -->
  <div class="spark" style="width:20px;height:20px;left:16%;top:19%;animation-duration:4.8s;animation-delay:.0s"></div>
  <div class="spark" style="width:11px;height:11px;left:22%;top:25%;animation-duration:5.6s;animation-delay:1.5s"></div>
  <div class="spark" style="width:16px;height:16px;right:18%;top:17%;animation-duration:5.1s;animation-delay:.9s"></div>
  <div class="spark" style="width:10px;height:10px;right:23%;top:24%;animation-duration:6.3s;animation-delay:2.2s"></div>
  <div class="spark" style="width: 8px;height: 8px;left:29%;top:22%;animation-duration:5.9s;animation-delay:3.3s"></div>
  <div class="spark" style="width: 9px;height: 9px;right:29%;top:27%;animation-duration:4.7s;animation-delay:1.9s"></div>

  <div class="content">

    <p class="invite a d1">Saira Khalil invites you to the</p>

    <h1 class="script a d2">Mehndi Ceremony</h1>

    <div class="of-row a d3">
      <div class="of-bar"></div>
      <span class="of-text">of</span>
      <div class="of-bar"></div>
    </div>

    <div class="names-block a d4">
      <span class="name">GOHAR</span>
      <span class="amp">&amp;</span>
      <span class="name">NAVEED</span>
    </div>

    <div class="orn a d5">
      <div class="orn-line"></div>
      <div class="orn-dot"></div>
      <div class="orn-dia"></div>
      <div class="orn-dot"></div>
      <div class="orn-line"></div>
    </div>

    <div class="date-wrap a d6">
      <p class="month-lbl">August</p>
      <div class="date-row">
        <div class="date-side"><span>Saturday</span></div>
        <div class="date-num">15</div>
        <div class="date-side"><span>At 5 pm</span></div>
      </div>
      <p class="year-lbl">2026</p>
    </div>

    <div class="gold-sep a d7"></div>
    <p class="at-lbl a d7">at</p>
    <p class="venue a d8">4142 Rue Baffin, Laval,<br>QC H7R 5W5</p>

  </div>

  <div class="rsvp-anchor a d9">
    <a class="rsvp-btn" href="#" onclick="openModal(event)">
      <span class="star">✦</span>
      RSVP
      <span class="star">✦</span>
    </a>
  </div>
</div>

<!-- ── RSVP Modal ──────────────────────────────────── -->
<div id="modal">
  <div class="card">
    <button class="card-close" onclick="closeModal()">&#10005;</button>
    <p class="card-title">Kindly Reply</p>
    <p class="card-sub">Gohar &amp; Naveed</p>

    <form id="rsvp-form" onsubmit="submitForm(event)">
      <input class="field" type="text"   id="f-name"   placeholder="Your full name"       required />
      <input class="field" type="number" id="f-guests" placeholder="Number of guests" min="1" max="10" required />
      <div class="attend-row">
        <button type="button" id="btn-yes" class="att-btn" onclick="pick(true)">Attending</button>
        <button type="button" id="btn-no"  class="att-btn" onclick="pick(false)">Unable to attend</button>
      </div>
      <button type="submit" class="submit-btn">Send Reply</button>
    </form>

    <div class="ty-wrap" id="ty" style="display:none">
      <div class="ty-star">✦</div>
      <p class="ty-title">Thank you!</p>
      <p class="ty-msg">We look forward to celebrating with you.</p>
    </div>
  </div>
</div>

<script>
  // ── Paste your deployed Apps Script URL here ──────────────────────────────
  const SHEET_URL = 'YOUR_APPS_SCRIPT_URL';
  // ─────────────────────────────────────────────────────────────────────────

  function openModal(e) {
    e.preventDefault();
    document.getElementById('modal').style.display = 'flex';
    document.getElementById('rsvp-form').style.display = 'block';
    document.getElementById('ty').style.display = 'none';
  }

  function closeModal() {
    document.getElementById('modal').style.display = 'none';
    document.querySelectorAll('.att-btn').forEach(b => b.classList.remove('on'));
  }

  function pick(yes) {
    document.getElementById('btn-yes').classList.toggle('on',  yes);
    document.getElementById('btn-no').classList.toggle('on', !yes);
  }

  function submitForm(e) {
    e.preventDefault();

    const payload = {
      name:      document.getElementById('f-name').value.trim(),
      guests:    document.getElementById('f-guests').value,
      attending: document.getElementById('btn-yes').classList.contains('on') ? 'Yes' : 'No'
    };

    // Send to Google Sheet (fire-and-forget; no-cors so no response body needed)
    if (SHEET_URL !== 'YOUR_APPS_SCRIPT_URL') {
      fetch(SHEET_URL, {
        method:  'POST',
        mode:    'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(payload)
      }).catch(() => {});
    }

    document.getElementById('rsvp-form').style.display = 'none';
    document.getElementById('ty').style.display = 'block';
  }

  document.getElementById('modal').addEventListener('click', e => {
    if (e.target === document.getElementById('modal')) closeModal();
  });
</script>

</body>
</html>
